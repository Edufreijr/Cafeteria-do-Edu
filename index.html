<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Café do Edu</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>

        <img src="Imagens/logo.png" alt="Logo" class="logo">

        <h1>Café do Edu</h1>
        <div class="menu-direita">
        <nav>
            <a href="#">Início</a>
            <a href="#">Locais</a>
            <a href="#">Contato</a>

        </nav>

        <button class="login">Login</button>
        </div>
        <button class="menu">&#9776;</button>

    </header>

    <main>

        <figure>

            <img src="Imagens/cafe.png" alt="Café">

            <figcaption>

                <p class="titulo">
                    Café
                    <span class="preco">R$ 8,00</span>
                </p>

                <p class="descricao">
                    Café preparado na hora com aroma intenso e sabor marcante.
                </p>

                <button>Comprar</button>

            </figcaption>

        </figure>

        <figure>

            <img src="Imagens/bolo.png" alt="Bolo">

            <figcaption>

                <p class="titulo">
                    Bolo
                    <span class="preco">R$ 12,00</span>
                </p>

                <p class="descricao">
                    Delicioso bolo de chocolate com cobertura cremosa.
                </p>

                <button>Comprar</button>

            </figcaption>

        </figure>

        <figure>

            <img src="Imagens/paodequeijo.png" alt="Pão de Queijo">

            <figcaption>

                <p class="titulo">
                    Pão de Queijo
                    <span class="preco">R$ 7,00</span>
                </p>

                <p class="descricao">
                    Pão de queijo quentinho, macio por dentro e crocante por fora.
                </p>

                <button>Comprar</button>

            </figcaption>

        </figure>

        <figure>

            <img src="Imagens/pao.png" alt="Pão Francês">

            <figcaption>

                <p class="titulo">
                    Pão Francês
                    <span class="preco">R$ 3,00</span>
                </p>

                <p class="descricao">
                    Pão francês fresco assado diariamente.
                </p>

                <button>Comprar</button>

            </figcaption>

        </figure>

        <figure class="oculto">

            <img src="Imagens/cookie.png" alt="Cookie">

            <figcaption>

                <p class="titulo">
                    Cookie
                    <span class="preco">R$ 9,00</span>
                </p>

                <p class="descricao">
                    Cookie com gotas de chocolate.
                </p>

                <button>Comprar</button>

            </figcaption>

        </figure>

    </main>

    <details>

        <summary>Horário de funcionamento</summary>

        <p>Segunda a Sexta: 08:00 às 18:00</p>

        <p>Sábado: 08:00 às 14:00</p>

    </details>

    <div class="satisfacao">

        <h3>Satisfação dos clientes</h3>

        <meter value="9" min="0" max="10"></meter>

    </div>

</body>

</html>

<footer>

    <p>Café do Edu</p>

    <p>Rua das Flores, 123 - Centro</p>

    <p>(21) 99999-9999</p>

    <p>© 2026 Café do Edu - Todos os direitos reservados.</p>

</footer>
